<!DOCTYPE html>  <html lang="en">  
<head>  
  <meta charset="UTF-8">  
  <title>Todo App Landing Page</title>  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">    <style>  
    * {  
      margin: 0;  
      padding: 0;  
      box-sizing: border-box;  
      font-family: Arial, sans-serif;  
    }  
  
    body {  
      height: 80vh;  
      background-color: navy;  
      display: flex;  
      align-items: center;  
      justify-content: center;  
    }  
  
    /* Dark overlay */  
    body::before {  
      content: "";  
      position: absolute;  
      width: 100%;  
      height: 100%;  
      background: rgba(0, 0, 0, 0.7);  
      top: 0;  
      left: 0;  
      z-index: 0;  
    }  
  
    .container {  
      position: relative;  
      z-index: 1;  
      width: 90%;  
      max-width: 500px;  
      margin: 20px;  
      padding: 40px 30px;  
      background: rgba(255, 255, 255, 0.08);  
      backdrop-filter: blur(10px);  
      border-radius: 12px;  
      text-align: center;  
      color: white;  
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);  
    }  
  
/* Custom Navbar */  
.custom-navbar {  
  position: fixed;  
  top: 0;  
  left: 0;  
  width: 100%;  
  background: rgba(0, 0, 0, 0.7); /* light black, semi-transparent */  
  display: flex;  
  justify-content: space-between; /* buttons left, logo right */  
  align-items: center;  
  padding: 10px 20px;  
  box-sizing: border-box;  
  z-index: 9999;  
  border-top: 2px solid #ff6b6b;  
border-bottom: 2px solid #ff6b6b;  
border-right: 2px solid #ff6b6b;  
border-left: 2px solid #ff6b6b;  
  font-family: Arial, sans-serif;  
}  
  
/* Buttons as a list */  
.custom-navbar .nav-buttons {  
  display: flex;  
  justify-content: space-evenly;  
  list-style: none; /* remove bullets */  
  margin: 0;  
  padding: 10px 0px;  
  width: 100%;  
}  
  
/* Button links */  
.custom-navbar .nav-btn {  
  padding: 8px 16px;  
  text-decoration: none;  
  color: white;  
  font-weight: bold;  
  border: 2px solid;  
  border-image: linear-gradient(45deg, #ff6b6b, #f7d794, #1dd1a1) 1;  
  border-radius: 5px;  
  transition: all 0.3s ease;  
}  
  
.custom-navbar .nav-btn:hover {  
  background: rgba(255, 255, 255, 0.1);  
  color: #fff;  
}  
  
/* Logo style */  
.custom-navbar .nav-logo {  
  width: 50px;  
  height: 50px;  
  border-radius: 50%;  
  background: white;  
  color: black;  
  display: flex;  
  align-items: center;  
  justify-content: center;  
  font-weight: bold;  
  cursor: default;  
  box-shadow: 0 0 5px rgba(0,0,0,0.5);  
  flex-shrink: 0;  
}  
  
    .logo {  
      width: 80px;  
      height: 80px;  
      margin: 0 auto 20px;  
      border-radius: 50%;  
      background: white;  
      display: flex;  
      align-items: center;  
      justify-content: center;  
      font-weight: bold;  
      color: black;  
      font-size: 20px;  
      position: relative;  
      bottom: 150px;  
  
    }  
  
    h1 {  
      margin-bottom: 10px;  
      font-size: 28px;  
    }  
  
    .tagline {  
      font-size: 16px;  
      margin-bottom: 20px;  
      opacity: 0.9;  
    }  
  
    .about {  
      font-size: 14px;  
      line-height: 1.6;  
      margin-bottom: 30px;  
      opacity: 0.8;  
    }  
  
    .btn {  
      display: inline-block;  
      padding: 12px 25px;  
      background: #00c6ff;  
      color: white;  
      text-decoration: none;  
      border-radius: 25px;  
      font-size: 16px;  
      transition: 0.3s;  
    }  
  
    .btn:hover {  
      background: #0072ff;  
    }  
    /* Large screen adjustments */
@media (min-width: 768px) {
  /* Increase container width on larger screens */
  .container {
    max-width: 700px;
    padding: 50px 40px;
  }

  /* Landing page logo grows */
  .logo {
    width: 120px;
    height: 120px;
    font-size: 28px;
    bottom: 180px;
    position: relative;  
    bottom: 200px;  
  }

  h1 {
    font-size: 36px;
  }

  .tagline {
    font-size: 20px;
  }

  .about {
    font-size: 16px;
  }

  .btn {
    padding: 15px 30px;
    font-size: 18px;
  }
}

@media (min-width: 1200px) {
  /* Extra wide screens adjustments */
  .container {
    max-width: 900px;
    padding: 60px 50px;
  }

  .logo {
    width: 150px;
    height: 150px;
    font-size: 32px;
    bottom: 250px;
  }

  h1 {
    font-size: 42px;
  }

  .tagline {
    font-size: 22px;
  }

  .about {
    font-size: 18px;
  }

  .btn {
    padding: 18px 35px;
    font-size: 20px;
  }
}
  </style>  
  </head>  
  <body>   
  <div class="container"> 
  <!-- Navbar Start --> 
  <nav class="custom-navbar">  
  <ul class="nav-buttons">  
    <li><a href="#" class="nav-btn">Home</a></li>  
    <li><a href="#" class="nav-btn">Notes</a></li>  
  </ul>  </nav>  
<!-- Navbar End -->  <!-- Logo -->  
<div class="logo">  
  LOGO  
</div>  

<!-- Company Name -->  
<h1>Your Todo App</h1>  

<!-- Tagline -->  
<p class="tagline">  
  Organize your life, one task at a time.  
</p>  

<!-- About -->  
<p class="about">  
  Our app helps you stay focused, productive, and stress-free.   
  Manage your daily tasks efficiently with a clean and simple interface   
  designed to keep you on track.  
</p>  

<!-- Button -->  
<a href="#" class="btn">Get Started</a>

  </div>  </body>  
</html>
