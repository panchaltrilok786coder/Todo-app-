<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Todo App Landing Page</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 80vh;
      background: url('https://images.unsplash.com/photo-1498050108023-c5249f4df085') no-repeat center center/cover;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Dark overlay */
    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      top: 0;
      left: 0;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 90%;
      max-width: 500px;
      margin: 20px;
      padding: 40px 30px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      text-align: center;
      color: white;
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    }

    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: black;
      font-size: 20px;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 28px;
    }

    .tagline {
      font-size: 16px;
      margin-bottom: 20px;
      opacity: 0.9;
    }

    .about {
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 30px;
      opacity: 0.8;
    }

    .btn {
      display: inline-block;
      padding: 12px 25px;
      background: #00c6ff;
      color: white;
      text-decoration: none;
      border-radius: 25px;
      font-size: 16px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #0072ff;
    }
  </style>
</head>

<body>

  <div class="container">
    
    <!-- Logo -->
    <div class="logo">
      LOGO
    </div>

    <!-- Company Name -->
    <h1>Your Todo App</h1>

    <!-- Tagline -->
    <p class="tagline">
      Organize your life, one task at a time.
    </p>

    <!-- About -->
    <p class="about">
      Our app helps you stay focused, productive, and stress-free. 
      Manage your daily tasks efficiently with a clean and simple interface 
      designed to keep you on track.
    </p>

    <!-- Button -->
    <a href="#" class="btn">Get Started</a>

  </div>

</body>
</html>
